<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指令部 — Japanese Command Station</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:     #0f0e0d;
    --bg-card:     #1a1917;
    --bg-hover:    #222120;
    --border:      #2e2c2a;
    --border-soft: #232120;
    --gold:        #d4a853;
    --gold-dim:    #9a7a3c;
    --gold-glow:   rgba(212,168,83,0.12);
    --sage:        #7aad8c;
    --blue-soft:   #5b8fb9;
    --text-primary:#f0ece4;
    --text-secondary:#9a9590;
    --text-dim:    #5a5650;
    --warning:     #e09b4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }
  .app-shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }
  .sidebar { grid-row: 1 / -1; background: var(--bg-card); border-right: 1px solid var(--border); padding: 28px 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 0 24px 28px; border-bottom: 1px solid var(--border-soft); margin-bottom: 16px; }
  .logo-jp { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 0.05em; line-height: 1; margin-bottom: 4px; }
  .logo-en { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
  .nav-section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); padding: 16px 24px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 24px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; font-size: 13.5px; font-weight: 400; color: var(--text-secondary); }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); border-left-color: var(--border); }
  .nav-item.active { background: var(--gold-glow); color: var(--gold); border-left-color: var(--gold); font-weight: 500; }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .streak-badge { margin: auto 24px 24px; background: linear-gradient(135deg, #1e1c18, #2a2720); border: 1px solid var(--gold-dim); border-radius: 10px; padding: 14px; text-align: center; }
  .streak-number { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--gold); line-height: 1; margin-bottom: 2px; }
  .streak-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dim); }
  .topbar { background: var(--bg-deep); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .topbar-left h1 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--text-primary); line-height: 1.1; }
  .topbar-left .date-line { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn-log { background: var(--gold); color: #0f0e0d; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 12.5px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s; }
  .btn-log:hover { background: #e0b860; transform: translateY(-1px); }
  .level-pill { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: var(--text-secondary); font-family: 'DM Mono', monospace; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); display: inline-block; vertical-align: middle; transition: background 0.3s; }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .main { padding: 28px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent, var(--gold)); opacity: 0.6; }
  .stat-card:hover { border-color: #3a3835; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
  .stat-sub { font-size: 11px; color: var(--text-secondary); }
  .stat-delta { font-size: 10.5px; font-weight: 500; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 6px; }
  .delta-up { background: rgba(122,173,140,0.12); color: var(--sage); }
  .delta-neutral { background: rgba(90,86,80,0.2); color: var(--text-dim); }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-soft); }
  .panel-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .panel-icon { font-size: 14px; }
  .panel-action { font-size: 11px; color: var(--gold); cursor: pointer; font-weight: 500; opacity: 0.8; transition: opacity 0.15s; }
  .panel-action:hover { opacity: 1; }
  .panel-body { padding: 16px 20px; }
  .log-entry { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border-soft); align-items: flex-start; }
  .log-entry:last-child { border-bottom: none; padding-bottom: 0; }
  .log-entry:first-child { padding-top: 0; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .dot-anki { background: var(--gold); }
  .dot-reading { background: var(--sage); }
  .dot-listening { background: var(--blue-soft); }
  .dot-output { background: var(--warning); }
  .log-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; flex: 1; }
  .log-text strong { color: var(--text-primary); font-weight: 500; }
  .log-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); flex-shrink: 0; margin-top: 2px; }
  .heatmap-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; margin-top: 4px; }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell { width: 100%; aspect-ratio: 1; border-radius: 2px; background: var(--border); transition: transform 0.1s; cursor: default; }
  .heatmap-cell:hover { transform: scale(1.3); z-index: 10; }
  .heatmap-cell[data-level="1"] { background: rgba(212,168,83,0.2); }
  .heatmap-cell[data-level="2"] { background: rgba(212,168,83,0.45); }
  .heatmap-cell[data-level="3"] { background: rgba(212,168,83,0.7); }
  .heatmap-cell[data-level="4"] { background: rgba(212,168,83,0.95); }
  .heatmap-cell[data-level="today"] { background: var(--gold); box-shadow: 0 0 6px rgba(212,168,83,0.5); }
  .heatmap-months { display: grid; grid-template-columns: repeat(13, 1fr); gap: 3px; margin-bottom: 6px; }
  .heatmap-month-label { font-size: 8.5px; color: var(--text-dim); letter-spacing: 0.06em; text-align: center; }
  .sparkbar-row { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-top: 8px; }
  .sparkbar { flex: 1; border-radius: 2px 2px 0 0; background: rgba(212,168,83,0.25); min-height: 2px; }
  .sparkbar.today { background: var(--gold); }
  .sparkbar-labels { display: flex; gap: 3px; margin-top: 3px; }
  .sparkbar-label { flex: 1; font-size: 8px; color: var(--text-dim); text-align: center; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; animation: modalIn 0.2s ease; }
  @keyframes modalIn { from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none} }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text-primary); font-weight: 400; }
  .modal-close { color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.15s; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 20px 24px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg-deep); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 13.5px; transition: border-color 0.15s; outline: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--bg-card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; accent-color: var(--gold); cursor: pointer; }
  .range-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold); min-width: 32px; text-align: right; }
  .type-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .type-tab { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; background: transparent; font-family: 'Outfit', sans-serif; }
  .type-tab.selected { background: var(--gold-glow); border-color: var(--gold-dim); color: var(--gold); }
  .btn-submit { width: 100%; background: var(--gold); color: #0f0e0d; border: none; padding: 11px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .btn-submit:hover { background: #e0b860; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-section { display: none; }
  .form-section.visible { display: block; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .fade-in { opacity: 0; transform: translateY(8px); animation: fadeUp 0.35s ease forwards; }
  @keyframes fadeUp { to{opacity:1;transform:none} }
  .fade-in:nth-child(1){animation-delay:.05s}.fade-in:nth-child(2){animation-delay:.10s}.fade-in:nth-child(3){animation-delay:.15s}.fade-in:nth-child(4){animation-delay:.20s}.fade-in:nth-child(5){animation-delay:.25s}
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg-card); border: 1px solid var(--sage); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--sage); z-index: 600; display: none; max-width: 280px; }
  .empty-state { text-align: center; padding: 28px 16px; color: var(--text-dim); font-size: 12.5px; line-height: 1.7; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }
  .loading-screen { position: fixed; inset: 0; background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 900; transition: opacity 0.4s; }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'DM Serif Display', serif; font-size: 40px; color: var(--gold); margin-bottom: 8px; }
  .loading-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 32px; }
  .loading-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">指令部</div>
  <div class="loading-sub">Command Station</div>
  <div class="loading-spinner"></div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-jp">指令部</div>
      <div class="logo-en">Command Station</div>
    </div>
    <div class="nav-section-label">Overview</div>
    <div class="nav-item active" onclick="switchView('dashboard')"><span class="nav-icon">⌂</span> Dashboard</div>
    <div class="nav-section-label">Modules</div>
    <div class="nav-item" onclick="switchView('anki')"><span class="nav-icon">🃏</span> Flashcards</div>
    <div class="nav-item" onclick="switchView('reading')"><span class="nav-icon">📖</span> Reading</div>
    <div class="nav-item" onclick="switchView('listening')"><span class="nav-icon">🎧</span> Listening</div>
    <div class="nav-item" onclick="switchView('output')"><span class="nav-icon">💬</span> Output</div>
    <div class="nav-section-label">Progress</div>
    <div class="nav-item" onclick="switchView('history')"><span class="nav-icon">📊</span> History</div>
    <div class="streak-badge">
      <div class="streak-number" id="sidebar-streak">—</div>
      <div class="streak-label">Day Streak 🔥</div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <h1 id="view-title">Good morning, Zach</h1>
      <div class="date-line" id="date-line"></div>
    </div>
    <div class="topbar-right">
      <span class="level-pill">N4 · ~3 yrs</span>
      <span class="sync-dot" id="sync-dot" title="Synced"></span>
      <button class="btn-log" onclick="openModal()">＋ Log Session</button>
    </div>
  </header>

  <main class="main" id="main-content"></main>
</div>

<!-- Log Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Log a Session</div>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <div class="type-tabs">
        <button class="type-tab selected" onclick="selectType('anki',this)">🃏 Anki</button>
        <button class="type-tab" onclick="selectType('reading',this)">📖 Reading</button>
        <button class="type-tab" onclick="selectType('listening',this)">🎧 Listening</button>
        <button class="type-tab" onclick="selectType('output',this)">💬 Output</button>
      </div>
      <!-- Anki -->
      <div class="form-section visible" id="form-anki">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Reviews Done</label><input class="form-input" type="number" id="anki-reviews" placeholder="e.g. 80" min="0"></div>
          <div class="form-group"><label class="form-label">New Cards</label><input class="form-input" type="number" id="anki-new" placeholder="e.g. 10" min="0"></div>
        </div>
        <div class="form-group"><label class="form-label">Deck / Focus</label><input class="form-input" type="text" id="anki-deck" placeholder="e.g. Core 2k, Grammar"></div>
        <div class="form-group"><label class="form-label">Minutes Spent</label><div
